name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        run: |
          SDK=$HOME/android-sdk
          mkdir -p $SDK
          curl -fSL -o $HOME/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q $HOME/cmdline-tools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          rm -f $HOME/cmdline-tools.zip
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "SDK installed. Platforms:"
          ls -la $SDK/platforms/
          echo "Build tools:"
          ls -la $SDK/build-tools/

      - name: Build
        id: build
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME/platforms/" 2>&1
          ls -la "$ANDROID_HOME/build-tools/" 2>&1
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('gradle-build.log', 'utf8').slice(0, 30000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Build failed #' + context.runNumber,
              body: '## Build Error\n```\n' + log + '\n```\n[View run](' + process.env.GITHUB_SERVER_URL + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')'
            });

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
