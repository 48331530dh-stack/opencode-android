name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Find and setup Android SDK
        run: |
          SDK=""
          for d in /usr/local/lib/android/sdk $ANDROID_HOME $ANDROID_SDK_ROOT $HOME/android-sdk; do
            if [ -d "$d" ] && [ -d "$d/platforms" ]; then SDK="$d"; break; fi
          done
          if [ -z "$SDK" ]; then
            echo "No pre-installed SDK, installing..."
            SDK=$HOME/android-sdk
            mkdir -p $SDK
            curl -sL -o cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip -d $SDK/cmdline-tools
            mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
            rm -f cmdline-tools.zip
          fi
          echo "SDK=$SDK"
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          ls -la $SDK/platforms/ 2>/dev/null || echo "No platforms yet"
          ls -la $SDK/build-tools/ 2>/dev/null || echo "No build-tools yet"

      - name: Install required SDK components
        run: |
          SDK="$ANDROID_HOME"
          CMDLINE="$SDK/cmdline-tools/latest/bin"
          if [ ! -f "$CMDLINE/sdkmanager" ]; then
            echo "sdkmanager not found at $CMDLINE"
            ls -la $SDK/cmdline-tools/ 2>/dev/null || echo "No cmdline-tools"
            exit 1
          fi
          yes | $CMDLINE/sdkmanager --licenses || true
          $CMDLINE/sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
          echo "Installed platforms:"
          ls -la $SDK/platforms/ 2>/dev/null

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Always show build log
        if: always()
        run: |
          echo "### Build output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat gradle-build.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: gradle-build.log

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASS" \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
