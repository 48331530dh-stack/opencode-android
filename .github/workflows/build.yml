name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        run: |
          SDK=$HOME/android-sdk
          CMDLINE_TOOLS_ZIP=$HOME/cmdline-tools.zip
          echo "Checking for pre-installed SDK..."
          ls -la /usr/local/lib/android/sdk 2>/dev/null && echo "Found!" || echo "Not found"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "Installing Android SDK at $SDK..."
          mkdir -p $SDK
          curl -fSL -o $CMDLINE_TOOLS_ZIP \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q $CMDLINE_TOOLS_ZIP -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          rm -f $CMDLINE_TOOLS_ZIP
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -5
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -20
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "$SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "SDK installed. Platforms:"
          ls -la $SDK/platforms/

      - name: Check Java and gradlew
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version 2>&1
          ls -la gradle/wrapper/
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 | tee gradle-check.log || echo "GRADLE_CHECK_FAILED"

      - name: Build release APK
        shell: bash
        if: success()
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Show check log
        if: always()
        run: |
          echo "=== gradle-check.log ==="
          cat gradle-check.log 2>/dev/null || echo "No check log"
          echo "=== gradle-build.log ==="
          cat gradle-build.log 2>/dev/null || echo "No build log"

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASS" \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
