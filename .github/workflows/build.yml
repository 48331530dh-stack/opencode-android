name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Install Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export CMDLINE_TOOLS=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          mkdir -p $CMDLINE_TOOLS
          curl -L -o cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          yes | $CMDLINE_TOOLS/sdkmanager --licenses || true
          $CMDLINE_TOOLS/sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" || true
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$CMDLINE_TOOLS" >> $GITHUB_PATH

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASS" \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
