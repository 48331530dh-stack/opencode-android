name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export CMDLINE_TOOLS=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          mkdir -p $CMDLINE_TOOLS
          echo "Downloading cmdline-tools..."
          curl -sL -o cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          echo "Extracting..."
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          echo "Accepting licenses..."
          yes | $CMDLINE_TOOLS/sdkmanager --licenses || echo "License accept maybe failed"
          echo "Installing SDK components..."
          $CMDLINE_TOOLS/sdkmanager --verbose "platforms;android-35" "build-tools;35.0.0" \
            || echo "SDK install may have failed"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "SDK installed at $ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/platforms/ || echo "No platforms dir"
          ls -la $ANDROID_SDK_ROOT/build-tools/ || echo "No build-tools dir"

      - name: Build release APK
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME not found"
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Show build log on failure
        if: failure()
        run: tail -50 gradle-build.log

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASS" \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
