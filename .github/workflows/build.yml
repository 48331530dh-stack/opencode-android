name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download opencode aarch64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/opencode-aarch64 \
            https://github.com/guysoft/opencode-termux/releases/latest/download/opencode-aarch64
          chmod +x app/src/main/assets/opencode-aarch64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        run: |
          SDK=$HOME/android-sdk
          mkdir -p $SDK
          curl -fSL -o $HOME/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q $HOME/cmdline-tools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          rm -f $HOME/cmdline-tools.zip
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Check and build
        shell: bash
        run: |
          echo "=== ENV ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          echo "=== Gradle version ==="
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 | tail -10
          echo "=== SDK platforms ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "=== Build ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Upload log to paste.rs
        if: failure()
        run: |
          echo "PASTE URL: $(cat gradle-build.log 2>/dev/null | curl -s -F 'f:1=<-' https://paste.rs/)"

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASS" \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
